<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKVV IT World — Infrastructure for the Next Generation</title>
<style>
  :root{
    --void:#0A0E14;
    --panel:#0F1722;
    --panel-2:#131D2B;
    --line:rgba(232,237,243,0.08);
    --line-bright:rgba(26,188,156,0.35);
    --teal:#1ABC9C;
    --teal-dim:rgba(26,188,156,0.15);
    --amber:#E8B854;
    --amber-dim:rgba(232,184,84,0.12);
    --text:#E6EDF3;
    --muted:#5C7080;
    --muted-2:#8B9CAD;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  body{
    background:var(--void);
    color:var(--text);
    font-family:var(--body);
    line-height:1.6;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  ::selection{background:var(--teal-dim); color:var(--teal);}

  a{color:inherit; text-decoration:none;}

  /* ===== Background atmosphere ===== */
  .bg-layer{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  .bg-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(26,188,156,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,188,156,0.035) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 40%, transparent 100%);
  }
  .orb{
    position:absolute; border-radius:50%; filter:blur(90px); opacity:0.35;
  }
  .orb-1{width:480px; height:480px; background:var(--teal); top:-180px; left:-120px; animation:float1 22s ease-in-out infinite;}
  .orb-2{width:420px; height:420px; background:var(--amber); top:40%; right:-180px; opacity:0.18; animation:float2 26s ease-in-out infinite;}
  .orb-3{width:380px; height:380px; background:#2563eb; opacity:0.12; bottom:-160px; left:30%; animation:float1 30s ease-in-out infinite reverse;}

  @keyframes float1{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(40px,60px);}
  }
  @keyframes float2{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(-50px,30px);}
  }

  .container{max-width:1180px; margin:0 auto; padding:0 28px;}

  /* ===== Nav ===== */
  nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    backdrop-filter:blur(16px); background:rgba(10,14,20,0.7);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    max-width:1180px; margin:0 auto; padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{
    font-family:var(--display); font-weight:700; font-size:1.15rem;
    display:flex; align-items:center; gap:10px; letter-spacing:0.01em;
  }
  .logo-mark{
    width:30px; height:30px; border-radius:8px;
    background:linear-gradient(135deg, var(--teal), #0d8a72);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:0.7rem; font-weight:700; color:var(--void);
    flex-shrink:0;
  }
  .nav-links{display:flex; gap:34px; align-items:center;}
  .nav-links a{
    font-size:0.88rem; color:var(--muted-2); font-weight:500;
    transition:color 0.2s; position:relative;
  }
  .nav-links a:hover{color:var(--text);}
  .nav-cta{
    padding:9px 20px; border-radius:8px;
    background:var(--teal); color:var(--void); font-weight:600; font-size:0.85rem;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .nav-cta:hover{transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,188,156,0.35);}
  .nav-toggle{display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none;}
  .nav-toggle span{width:22px; height:2px; background:var(--text);}

  @media (max-width:880px){
    .nav-links{
      position:fixed; top:64px; right:0; height:calc(100vh - 64px); width:78%;
      background:rgba(10,14,20,0.98); flex-direction:column; justify-content:flex-start;
      padding:40px 32px; gap:26px; transform:translateX(100%); transition:transform 0.35s ease;
      border-left:1px solid var(--line);
