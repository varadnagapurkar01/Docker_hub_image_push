name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
	    docker build -t varadnagapurkar19/docker-img-push:${{ github.run_number }} .
    	    docker build -t varadnagapurkar19/docker-img-push:latest .
      - name: Push Image
        run: |
            docker push varadnagapurkar19/docker-img-push:${{ github.run_number }}
            docker push varadnagapurkar19/docker-img-push:latest
